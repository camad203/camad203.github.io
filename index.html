<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ┌─────────────────────────────────────────────────────┐
       │  PAGE TITLE — shown in browser tab                  │
       └─────────────────────────────────────────────────────┘ -->
  <title>Nocturne — Ambient Player</title>

  <!-- Google Fonts — swap these URLs to change the fonts
       Current fonts: Playfair Display (headings) + DM Mono (body)
       Find alternatives at: https://fonts.google.com           -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <!-- External stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background: animated star canvas (drawn by JS) -->
  <canvas id="starfield"></canvas>

  <!-- Background: three soft glowing colour blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════════════════ -->
  <main class="stage">

    <!-- ┌──────────────────────────────────────────────────┐
         │  TAGLINE — small italic text above the image     │
         │  Edit the text between the tags to change it     │
         └──────────────────────────────────────────────────┘ -->
    <div class="page-title">ambient · generative</div>

    <!-- ┌──────────────────────────────────────────────────┐
         │  FLOATING IMAGE                                   │
         │  • To swap in a real photo/image, replace the    │
         │    <svg>...</svg> block with:                     │
         │    <img src="your-image.jpg" alt="description">  │
         │  • Size is controlled by .image-frame in CSS     │
         │  • Float speed: hoverFloat in CSS                │
         └──────────────────────────────────────────────────┘ -->
    <div class="float-wrap" id="floater" onclick="handleImageClick()" title="Click to play">
      <div class="image-ring" id="imageRing"></div>
      <div class="image-frame">
        <!-- SVG illustration — replace this entire <svg> block
             with <img src="photo.jpg" alt="..."> if you prefer a photo -->
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="skyGrad" cx="50%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#1b1040"/>
              <stop offset="100%" stop-color="#070e1c"/>
            </radialGradient>
            <radialGradient id="moonGrad" cx="38%" cy="38%" r="52%">
              <stop offset="0%" stop-color="#f7edca"/>
              <stop offset="60%" stop-color="#d4b870"/>
              <stop offset="100%" stop-color="#b8954a"/>
            </radialGradient>
            <radialGradient id="waterGrad" cx="50%" cy="0%" r="100%">
              <stop offset="0%" stop-color="#101e32"/>
              <stop offset="100%" stop-color="#060d18"/>
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="100" fill="url(#skyGrad)"/>
          <circle cx="28"  cy="22"  r="0.9" fill="#fff" opacity="0.85"/>
          <circle cx="52"  cy="14"  r="0.6" fill="#fff" opacity="0.6"/>
          <circle cx="75"  cy="28"  r="1.1" fill="#fff" opacity="0.7"/>
          <circle cx="93"  cy="18"  r="0.7" fill="#fff" opacity="0.5"/>
          <circle cx="118" cy="12"  r="0.9" fill="#fff" opacity="0.8"/>
          <circle cx="138" cy="30"  r="0.6" fill="#fff" opacity="0.55"/>
          <circle cx="162" cy="18"  r="1.0" fill="#fff" opacity="0.75"/>
          <circle cx="178" cy="44"  r="0.7" fill="#fff" opacity="0.6"/>
          <circle cx="42"  cy="48"  r="0.5" fill="#fff" opacity="0.4"/>
          <circle cx="170" cy="68"  r="0.8" fill="#fff" opacity="0.7"/>
          <circle cx="22"  cy="68"  r="0.7" fill="#fff" opacity="0.5"/>
          <circle cx="185" cy="85"  r="0.5" fill="#fff" opacity="0.45"/>
          <circle cx="108" cy="38"  r="0.6" fill="#fff" opacity="0.5"/>
          <circle cx="62"  cy="62"  r="0.5" fill="#fff" opacity="0.4"/>
          <circle cx="144" cy="52"  r="24"  fill="url(#moonGrad)" opacity="0.95"/>
          <circle cx="152" cy="44"  r="24"  fill="#0e1020" opacity="0.88"/>
          <circle cx="132" cy="56"  r="2.5" fill="rgba(0,0,0,0.08)"/>
          <circle cx="138" cy="64"  r="1.5" fill="rgba(0,0,0,0.06)"/>
          <polygon points="-2,145 30,95 60,130 95,75 130,110 165,55 200,100 200,200 -2,200" fill="#0b192c"/>
          <polygon points="-2,165 20,120 55,145 90,100 125,130 160,80 195,118 200,200 -2,200" fill="#0d1f35"/>
          <polygon points="-2,185 0,160 35,140 70,165 100,145 135,170 165,148 200,168 200,200 -2,200" fill="#091525"/>
          <polygon points="12,175 17,155 22,175"   fill="#060f1a"/>
          <polygon points="22,178 28,156 34,178"   fill="#060f1a"/>
          <polygon points="35,180 41,160 47,180"   fill="#060f1a"/>
          <polygon points="150,172 156,152 162,172" fill="#060f1a"/>
          <polygon points="162,176 168,155 174,176" fill="#060f1a"/>
          <polygon points="173,179 180,157 187,179" fill="#060f1a"/>
          <rect x="-2" y="162" width="204" height="40" fill="url(#waterGrad)"/>
          <line x1="10"  y1="170" x2="55"  y2="170" stroke="#d4b870" stroke-width="0.6" opacity="0.12"/>
          <line x1="70"  y1="173" x2="130" y2="173" stroke="#d4b870" stroke-width="0.5" opacity="0.1"/>
          <line x1="15"  y1="178" x2="50"  y2="178" stroke="#d4b870" stroke-width="0.4" opacity="0.08"/>
          <line x1="140" y1="167" x2="190" y2="167" stroke="#d4b870" stroke-width="0.6" opacity="0.12"/>
          <line x1="100" y1="180" x2="160" y2="180" stroke="#d4b870" stroke-width="0.4" opacity="0.08"/>
          <ellipse cx="144" cy="178" rx="9" ry="3.5" fill="#d4b870" opacity="0.18"/>
          <ellipse cx="144" cy="183" rx="5" ry="2"   fill="#d4b870" opacity="0.1"/>
          <text x="100" y="142" text-anchor="middle" font-size="28" fill="rgba(255,255,255,0.07)" font-family="serif">♫</text>
        </svg>
      </div>
      <!-- Hint text below the image -->
      <div class="tap-hint" id="tapHint">click to play</div>
    </div>

    <!-- ┌──────────────────────────────────────────────────┐
         │  MUSIC PLAYER PANEL                              │
         │  Hidden by default; revealed on first click      │
         └──────────────────────────────────────────────────┘ -->
    <div class="music-panel" id="musicPanel">

      <!-- Track title & subtitle (updated by JS from the tracks array) -->
      <div class="track-info">
        <div class="track-name" id="trackName">Nocturne in C minor</div>
        <div class="track-meta" id="trackMeta">generative · ambient · ∞</div>
      </div>

      <!-- Animated waveform bars (generated by JS) -->
      <div class="waveform" id="waveform"></div>

      <!-- Progress bar row -->
      <div class="progress-row">
        <span class="time-label" id="elapsed">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label right">∞</span>
      </div>

      <!-- Playback controls -->
      <div class="controls">
        <button class="ctrl" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
        <button class="ctrl play-ctrl" id="playBtn" onclick="togglePlay()" title="Play / Pause">&#9654;</button>
        <button class="ctrl" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
      </div>

      <!-- Volume slider -->
      <div class="vol-row">
        <span class="vol-icon">&#128264;</span>
        <input type="range" id="volSlider" min="0" max="100" value="70" oninput="setVolume(this.value)" />
        <span id="volLabel">70</span>
      </div>

      <!-- Track selector dots (generated by JS from the tracks array) -->
      <div class="track-dots" id="trackDots"></div>

    </div>
  </main>

  <!-- External scripts — must come after the HTML body -->
  <script src="player.js"></script>

</body>
</html>
