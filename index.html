<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ┌─────────────────────────────────────────────────────┐
       │  PAGE TITLE — shown in browser tab                  │
       └─────────────────────────────────────────────────────┘ -->
  <title>Nocturne — Ambient Player</title>

  <!-- Google Fonts — swap these URLs to change the fonts
       Current fonts: Playfair Display (headings) + DM Mono (body)
       Find alternatives at: https://fonts.google.com           -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <!-- External stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background: animated star canvas (drawn by JS) -->
  <canvas id="starfield"></canvas>

  <!-- Background: three soft glowing colour blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════════════════ -->
  <main class="stage">

    <!-- ┌──────────────────────────────────────────────────┐
         │  TAGLINE — small italic text above the image     │
         │  Edit the text between the tags to change it     │
         └──────────────────────────────────────────────────┘ -->
    <div class="page-title">ambient · generative</div>

    <!-- ┌──────────────────────────────────────────────────┐
         │  FLOATING IMAGE                                   │
         │  • To swap in a real photo/image, replace the    │
         │    <svg>...</svg> block with:                     │
         │    <img src="your-image.jpg" alt="description">  │
         │  • Size is controlled by .image-frame in CSS     │
         │  • Float speed: hoverFloat in CSS                │
         └──────────────────────────────────────────────────┘ -->
    <div class="float-wrap" id="floater" onclick="handleImageClick()" title="Click to play">
      <div class="image-ring" id="imageRing"></div>
      <div class="image-frame">
        <!-- SVG illustration — replace this entire <svg> block
             with <img src="photo.jpg" alt="..."> if you prefer a photo -->
       <img src="https://github.com/camad203/camad203.github.io/blob/shitpost/assets/kemponut.png">
      </div>
      <!-- Hint text below the image -->
      <div class="tap-hint" id="tapHint">click to play</div>
    </div>

    <!-- ┌──────────────────────────────────────────────────┐
         │  MUSIC PLAYER PANEL                              │
         │  Hidden by default; revealed on first click      │
         └──────────────────────────────────────────────────┘ -->
    <div class="music-panel" id="musicPanel">

      <!-- Track title & subtitle (updated by JS from the tracks array) -->
      <div class="track-info">
        <div class="track-name" id="trackName">Nocturne in C minor</div>
        <div class="track-meta" id="trackMeta">generative · ambient · ∞</div>
      </div>

      <!-- Animated waveform bars (generated by JS) -->
      <div class="waveform" id="waveform"></div>

      <!-- Progress bar row -->
      <div class="progress-row">
        <span class="time-label" id="elapsed">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label right">∞</span>
      </div>

      <!-- Playback controls -->
      <div class="controls">
        <button class="ctrl" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
        <button class="ctrl play-ctrl" id="playBtn" onclick="togglePlay()" title="Play / Pause">&#9654;</button>
        <button class="ctrl" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
      </div>

      <!-- Volume slider -->
      <div class="vol-row">
        <span class="vol-icon">&#128264;</span>
        <input type="range" id="volSlider" min="0" max="100" value="70" oninput="setVolume(this.value)" />
        <span id="volLabel">70</span>
      </div>

      <!-- Track selector dots (generated by JS from the tracks array) -->
      <div class="track-dots" id="trackDots"></div>

    </div>
  </main>

  <!-- External scripts — must come after the HTML body -->
  <script src="player.js"></script>

</body>
</html>
